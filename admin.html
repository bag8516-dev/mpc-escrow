<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MPC 에스크로 관리자</title>
<style>
:root {
  --gold:#C9A84C; --gold-light:#E2C06A; --gold-dark:#A07830;
  --gold-glow:rgba(201,168,76,.28);
  --navy:#0A0F1E; --navy2:#0D1526; --navy3:#111D35;
  --card:#0F1A30; --card2:#152038;
  --border:#1E2E4A; --border-gold:rgba(201,168,76,.30);
  --text:#FFFFFF; --text2:#B8C6D8; --text3:#5A7090;
  --success:#2ECC71; --warning:#F39C12; --danger:#E74C3C;
  --radius:16px; --radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--navy);color:var(--text);font-family:'Pretendard','-apple-system','BlinkMacSystemFont','맑은 고딕',sans-serif;font-size:15px;line-height:1.6;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,select{outline:none;border:none;font-family:inherit;color:var(--text);background:transparent;}

#app{max-width:480px;margin:0 auto;padding-bottom:40px;}

.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--navy2);border-bottom:1px solid rgba(231,76,60,.3);position:sticky;top:0;z-index:100;}
.header-title{font-size:16px;font-weight:900;color:var(--gold);}
.admin-badge{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);color:#E98080;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin:12px 16px 0;}
.card-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:14px;text-transform:uppercase;letter-spacing:1.2px;}

.btn{width:100%;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;transition:all .15s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0A0F1E;}
.btn-danger{background:linear-gradient(135deg,#E74C3C,#922B21);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border-gold);color:var(--text2);}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;}
.btn-success{background:linear-gradient(135deg,#2ECC71,#1a8a4a);color:#fff;}

.input-wrap{background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:8px;margin-bottom:12px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:var(--gold);}
.input-wrap input,.input-wrap select{flex:1;font-size:15px;font-weight:600;background:var(--navy3);color:var(--text);}
.input-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;}
.input-unit{font-size:13px;color:var(--gold);font-weight:600;}

.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:13px;color:var(--text2);}
.stat-val{font-size:15px;font-weight:700;color:var(--gold);}

.tx-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;}
.tx-item:last-child{margin-bottom:0;}
.tx-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.tx-id{font-size:12px;color:var(--text3);}
.tx-sigs{font-size:13px;font-weight:700;}
.tx-sigs.done{color:var(--success);}
.tx-sigs.pending{color:var(--warning);}
.tx-detail{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.7;}
.tx-detail strong{color:var(--text);}
.tx-actions{display:flex;gap:8px;}

.alert{padding:14px;border-radius:var(--radius-sm);font-size:14px;line-height:1.6;margin-bottom:12px;}
.alert-danger{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#E98080;}
.alert-success{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:#2ECC71;}
.alert-info{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:var(--gold-light);}

.wallet-section{padding:20px 16px 0;}
.wallet-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--radius-sm);background:var(--card2);border:1.5px solid var(--border-gold);color:var(--text2);font-size:14px;font-weight:600;width:100%;}
.wallet-connected{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border-gold);border-radius:var(--radius-sm);padding:10px 14px;}
.dot-green{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success);flex-shrink:0;}
.addr-text{font-family:monospace;font-size:13px;color:var(--text2);}

.empty-state{text-align:center;padding:30px 0;color:var(--text3);font-size:14px;}

.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;z-index:9999;pointer-events:none;}
.toast{background:#1E2E4A;border:1px solid var(--border-gold);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);margin-top:8px;animation:slideUp .2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:500;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px;}
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-title">🔐 MPC 에스크로</div>
    <div class="admin-badge">관리자</div>
  </div>

  <!-- 지갑 연결 -->
  <div class="wallet-section">
    <div id="areaConnect">
      <button class="wallet-btn" id="btnConnect" onclick="connectWallet()">🔗 관리자 지갑 연결하기</button>
    </div>
    <div id="areaConnected" style="display:none">
      <div class="wallet-connected">
        <div class="dot-green"></div>
        <div class="addr-text" id="displayAddr"></div>
        <div id="ownerBadge" style="margin-left:auto;font-size:12px;font-weight:700;"></div>
      </div>
    </div>
  </div>

  <!-- 권한 없음 -->
  <div id="pageUnauth" style="display:none;text-align:center;padding:60px 20px;">
    <div style="font-size:50px;margin-bottom:16px;">🚫</div>
    <div style="font-size:18px;font-weight:800;margin-bottom:8px;">접근 권한이 없습니다</div>
    <div style="color:var(--text2);font-size:14px;">오너 지갑으로만 접속 가능합니다</div>
  </div>

  <!-- 관리자 화면 (오너만) -->
  <div id="pageAdmin" style="display:none;">

    <!-- 컨트랙트 잔액 -->
    <div class="card">
      <div class="card-title">📊 컨트랙트 현재 잔액</div>
      <div class="stat-row">
        <div class="stat-label">MPC 잔액</div>
        <div class="stat-val" id="statMpc">조회 중...</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">USDT 잔액</div>
        <div class="stat-val" id="statUsdt">조회 중...</div>
      </div>
      <button class="btn btn-outline btn-sm" style="margin-top:12px;width:auto;" onclick="loadBalances()">🔄 새로고침</button>
    </div>

    <!-- 전체 거래 현황 (최근 24시간) -->
    <div class="card">
      <div class="card-title">📈 전체 거래 현황</div>
      <div class="input-wrap" style="margin-bottom:12px">
        <input type="text" id="admSearch" placeholder="🔍 지갑 주소 또는 거래 ID 검색 (4자 이상)" oninput="setAdminSearch(this.value)" style="font-size:14px">
      </div>
      <div id="tradeStats"></div>
      <div id="tradeList" style="margin-top:12px;"><div class="empty-state">조회 중...</div></div>
      <button class="btn btn-outline btn-sm" style="margin-top:12px;width:auto;" onclick="loadTrades()">🔄 새로고침</button>
    </div>

    <!-- 대기 중인 서명 요청 -->
    <div class="card">
      <div class="card-title">✍️ 대기 중인 서명 요청</div>
      <div id="txList"><div class="empty-state">조회 중...</div></div>
      <button class="btn btn-outline btn-sm" style="margin-top:12px;width:auto;" onclick="loadTxList()">🔄 새로고침</button>
    </div>

    <!-- 긴급 출금 제안 -->
    <div class="card">
      <div class="card-title">🚨 긴급 출금 제안</div>
      <div class="alert alert-info" style="margin-bottom:14px;">
        ⚠️ 2개 지갑 모두 서명해야 실행됩니다.<br>
        제안 후 다른 지갑으로도 서명해주세요.
      </div>

      <label class="input-label">토큰 선택</label>
      <div class="input-wrap" style="margin-bottom:12px;">
        <select id="withdrawToken" style="flex:1;font-size:15px;font-weight:600;background:transparent;">
          <option value="MPC">MPC</option>
          <option value="USDT">USDT</option>
        </select>
      </div>

      <label class="input-label">출금 금액</label>
      <div class="input-wrap">
        <input type="number" id="withdrawAmount" placeholder="0" step="any" min="0">
        <span class="input-unit" id="withdrawUnit">MPC</span>
      </div>

      <label class="input-label">수령 지갑 주소</label>
      <div class="input-wrap">
        <input type="text" id="withdrawTo" placeholder="0x...">
      </div>

      <div id="withdrawError" style="display:none;" class="alert alert-danger"></div>

      <button class="btn btn-danger" id="btnWithdraw" onclick="proposeWithdrawal()" style="margin-top:4px;">
        🚨 출금 제안하기
      </button>
    </div>

    <!-- 컨트랙트 정보 -->
    <div class="card">
      <div class="card-title">📋 컨트랙트 정보</div>
      <div class="stat-row">
        <div class="stat-label">프록시</div>
        <div style="font-family:monospace;font-size:11px;color:var(--text3);">0x958eed8B...e5972</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">멀티시그</div>
        <div style="font-family:monospace;font-size:11px;color:var(--text3);">0x944936BF...0e87</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">오너 1</div>
        <div style="font-family:monospace;font-size:11px;color:var(--text3);">0x9A1f24...458</div>
      </div>
      <div class="stat-row">
        <div class="stat-label">오너 2</div>
        <div style="font-family:monospace;font-size:11px;color:var(--text3);">0xF07ab4...00c1</div>
      </div>
    </div>

  </div><!-- /pageAdmin -->

</div><!-- /app -->

<!-- 토스트 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ── 설정 ────────────────────────────────────────────────────────────────────
const ADMIN_CONFIG = {
  CHAIN_ID:    137,
  ESCROW_PROXY:   '0x958eed8B9c77f79420c3cde1998DF4EFb27e5972',
  MULTISIG:       '0x944936BF08e9aeB817Dad323Fd4888A9f1D80e87',
  MPC_TOKEN:      '0x2d854416d2749B1F0eb8a4B2Ab9027989F2ba262',
  USDT_TOKEN:     '0xc2132D05D31c914a87C6611C10748AEb04B58e8F',
  OWNERS: [
    '0x9A1f2405650F43213a0ddbbBAfa933c24125F458',
    '0xF07ab48453B4f97cC15966a6F06F815399ea00c1',
  ],
  RPC_FALLBACKS: [
    'https://rpc-mainnet.matic.quiknode.pro',   // 이벤트 대량 조회 가능
    'https://polygon-bor-rpc.publicnode.com',
    'https://polygon.drpc.org',
    'https://1rpc.io/matic',
    'https://polygon-pokt.nodies.app',
  ],
};

const MULTISIG_ABI = [
  'function submitTransaction(address to, uint256 value, bytes calldata data) returns (uint256)',
  'function confirmTransaction(uint256 txId)',
  'function revokeConfirmation(uint256 txId)',
  'function getTransaction(uint256 txId) view returns (address to, uint256 value, bytes memory data, bool executed, uint256 confirmations)',
  'function transactionCount() view returns (uint256)',
  'function confirmed(uint256 txId, address owner) view returns (bool)',
  'function getOwners() view returns (address[])',
];

const ESCROW_ADMIN_ABI = [
  'function emergencyWithdraw(address token, uint256 amount, address to)',
  'function expireTrade(bytes32 tradeId)',
];

const ERC20_ABI = [
  'function balanceOf(address account) view returns (uint256)',
];

const ESCROW_VIEW_ABI = [
  'event TradeRevealed(bytes32 indexed tradeId, address indexed seller, uint256 mpcAmount, uint256 usdtAmount, uint256 krwPerUsdt)',
  'function getTrade(bytes32 tradeId) view returns (tuple(address seller,address buyer,uint256 mpcAmount,uint256 usdtPricePerMPC,uint256 usdtAmount,uint256 krwPerUsdt,uint256 createdAt,uint256 sellerDepositBlock,uint8 status,bool sellerDeposited,bool buyerDeposited,bytes32 commitHash))',
];

// ── 전역 상태 ─────────────────────────────────────────────────────────────
let walletAddress = null;
let ethersProvider = null;
let ethersSigner = null;
let multisigContract = null;
let isOwner = false;

// ── RPC fallback provider ─────────────────────────────────────────────────
let _readProvider = null;
async function getReadProvider() {
  if (_readProvider) return _readProvider;
  for (const rpc of ADMIN_CONFIG.RPC_FALLBACKS) {
    try {
      const p = new ethers.providers.JsonRpcProvider(rpc);
      await p.getBlockNumber();
      _readProvider = p;
      return p;
    } catch {}
  }
  return null;
}

// ── 유틸 ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function setBtn(id, text, disabled) {
  const b = document.getElementById(id);
  if (!b) return;
  b.textContent = text;
  b.disabled = disabled;
}

function shortAddr(addr) {
  if (!addr) return '';
  return addr.slice(0, 6) + '...' + addr.slice(-4);
}

function isOwnerAddr(addr) {
  if (!addr) return false;
  return ADMIN_CONFIG.OWNERS.some(o => o.toLowerCase() === addr.toLowerCase());
}

// ── 지갑 연결 ────────────────────────────────────────────────────────────
async function connectWallet() {
  if (!window.ethereum) {
    showToast('Trust Wallet 앱 브라우저에서 접속해주세요');
    return;
  }
  try {
    setBtn('btnConnect', '연결 중...', true);
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    if (!accounts || accounts.length === 0) throw new Error('연결 거부됨');

    walletAddress = accounts[0];
    ethersProvider = new ethers.providers.Web3Provider(window.ethereum);
    ethersSigner = ethersProvider.getSigner();

    // 네트워크 전환 — 확인(getNetwork)은 지갑 노드 401에 취약하므로 확인 없이 바로 요청
    // (이미 폴리곤이면 지갑이 조용히 무시함)
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: '0x' + ADMIN_CONFIG.CHAIN_ID.toString(16) }],
      });
      ethersProvider = new ethers.providers.Web3Provider(window.ethereum);
      ethersSigner = ethersProvider.getSigner();
    } catch {
      // 전환 실패 시에만 현재 체인 확인 (3회) — 이미 폴리곤이면 통과
      let onPolygon = false;
      for (let i = 0; i < 3 && !onPolygon; i++) {
        try {
          const network = await ethersProvider.getNetwork();
          onPolygon = network.chainId === ADMIN_CONFIG.CHAIN_ID;
          if (!onPolygon) break;
        } catch { await new Promise(r => setTimeout(r, 1500)); }
      }
      if (!onPolygon) {
        showToast('Polygon 네트워크로 전환해주세요');
        setBtn('btnConnect', '🔗 관리자 지갑 연결하기', false);
        return;
      }
    }

    // UI 업데이트
    document.getElementById('areaConnect').style.display = 'none';
    document.getElementById('areaConnected').style.display = 'block';
    document.getElementById('displayAddr').textContent = shortAddr(walletAddress);

    isOwner = isOwnerAddr(walletAddress);

    if (!isOwner) {
      document.getElementById('ownerBadge').textContent = '❌ 권한없음';
      document.getElementById('ownerBadge').style.color = 'var(--danger)';
      document.getElementById('pageUnauth').style.display = 'block';
      return;
    }

    document.getElementById('ownerBadge').textContent = '✅ 오너';
    document.getElementById('ownerBadge').style.color = 'var(--success)';
    document.getElementById('pageAdmin').style.display = 'block';

    // 멀티시그 컨트랙트 초기화
    multisigContract = new ethers.Contract(ADMIN_CONFIG.MULTISIG, MULTISIG_ABI, ethersSigner);

    // 토큰 선택 변경 시 단위 업데이트
    document.getElementById('withdrawToken').addEventListener('change', (e) => {
      document.getElementById('withdrawUnit').textContent = e.target.value;
    });

    // 데이터 로드
    await Promise.all([loadBalances(), loadTxList(), loadTrades()]);

  } catch (err) {
    setBtn('btnConnect', '🔗 관리자 지갑 연결하기', false);
    if (err?.code !== 4001 && err?.code !== 'ACTION_REJECTED') {
      showToast('연결 오류: ' + (err?.message || String(err)));
    }
  }
}

// ── 컨트랙트 잔액 조회 ───────────────────────────────────────────────────
async function loadBalances() {
  try {
    const rp = await getReadProvider();
    if (!rp) { showToast('RPC 연결 실패'); return; }

    const mpc  = new ethers.Contract(ADMIN_CONFIG.MPC_TOKEN,  ERC20_ABI, rp);
    const usdt = new ethers.Contract(ADMIN_CONFIG.USDT_TOKEN, ERC20_ABI, rp);

    const [mpcBal, usdtBal] = await Promise.all([
      mpc.balanceOf(ADMIN_CONFIG.ESCROW_PROXY),
      usdt.balanceOf(ADMIN_CONFIG.ESCROW_PROXY),
    ]);

    const mpcAmt  = parseFloat(ethers.utils.formatUnits(mpcBal,  18)).toLocaleString(undefined, {maximumFractionDigits: 2});
    const usdtAmt = parseFloat(ethers.utils.formatUnits(usdtBal,  6)).toLocaleString(undefined, {maximumFractionDigits: 2});

    document.getElementById('statMpc').textContent  = mpcAmt  + ' MPC';
    document.getElementById('statUsdt').textContent = usdtAmt + ' USDT';
  } catch (err) {
    document.getElementById('statMpc').textContent  = '조회 실패';
    document.getElementById('statUsdt').textContent = '조회 실패';
  }
}

// ── 전체 거래 현황 (배포 시점부터 — 증분 캐시 방식) ──────────────────────
// 한 번 조회한 블록 구간은 localStorage에 저장 → 다음 조회는 새 블록만 스캔
// (이벤트의 불변 정보만 캐시하고, 거래 상태는 매번 체인에서 새로 확인)
const DEPLOY_BLOCK = 89500000; // 2026-07-02 배포 직전 블록 (블록타임 1.5초 기준)
const SCAN_KEY = 'admin_trade_scan_v1';

function loadScanCache() {
  try { return JSON.parse(localStorage.getItem(SCAN_KEY) || 'null') || { lastBlock: DEPLOY_BLOCK - 1, trades: {} }; }
  catch { return { lastBlock: DEPLOY_BLOCK - 1, trades: {} }; }
}
function saveScanCache(cache) {
  try { localStorage.setItem(SCAN_KEY, JSON.stringify(cache)); } catch {}
}

// startBlock~latest 구간을 청크로 나눠 병렬 조회 (진행률 콜백 지원)
async function scanNewEvents(startBlock, onProgress) {
  const CHUNK = 45000;
  for (const url of ADMIN_CONFIG.RPC_FALLBACKS) {
    try {
      const lp = new ethers.providers.JsonRpcProvider(url);
      const lc = new ethers.Contract(ADMIN_CONFIG.ESCROW_PROXY, ESCROW_VIEW_ABI, lp);
      const latest = await lp.getBlockNumber();
      if (startBlock > latest) return { events: [], latest };
      const ranges = [];
      for (let f = startBlock; f <= latest; f += CHUNK) ranges.push([f, Math.min(f + CHUNK - 1, latest)]);
      let done = 0;
      const results = await Promise.all(ranges.map(([f, t]) =>
        lc.queryFilter(lc.filters.TradeRevealed(), f, t).then(r => {
          done++;
          if (onProgress) onProgress(done, ranges.length);
          return r;
        })
      ));
      const events = [];
      results.forEach(a => events.push(...a));
      return { events, latest };
    } catch { /* 다음 RPC 시도 */ }
  }
  return null;
}

function fmtRemainAdmin(sec) {
  if (sec >= 3600) return Math.floor(sec/3600) + '시간 ' + Math.floor((sec%3600)/60) + '분';
  if (sec >= 60)   return Math.floor(sec/60) + '분';
  return sec + '초';
}

async function loadTrades() {
  const listEl = document.getElementById('tradeList');
  const statsEl = document.getElementById('tradeStats');
  const cache = loadScanCache();
  const firstScan = Object.keys(cache.trades).length === 0;
  listEl.innerHTML = '<div class="empty-state">' + (firstScan
    ? '최초 조회 중 — 배포 이후 전체 기록을 스캔합니다 (약 1분, 처음 한 번만)'
    : '새 거래 확인 중...') + '</div>';
  try {
    // 1. 캐시 이후의 새 블록만 스캔 (진행률 표시)
    const scanned = await scanNewEvents(cache.lastBlock + 1, (done, total) => {
      listEl.innerHTML = `<div class="empty-state">블록 스캔 중... (${done}/${total})</div>`;
    });
    if (scanned === null) throw new Error('scan');

    // 2. 새 이벤트를 캐시에 병합 (불변 정보만)
    for (const ev of scanned.events) {
      cache.trades[ev.args.tradeId] = {
        seller: ev.args.seller,
        mpcAmt: parseFloat(ethers.utils.formatUnits(ev.args.mpcAmount, 18)),
        usdt:   parseFloat(ethers.utils.formatUnits(ev.args.usdtAmount, 6)),
      };
    }
    cache.lastBlock = scanned.latest;
    saveScanCache(cache);

    // 3. 거래 상태 확인 — 이미 종결(완료·취소·만료)로 저장된 건은 재조회 생략 (상태 불변)
    //    → 거래가 수천 건 쌓여도 조회량이 늘지 않음
    listEl.innerHTML = '<div class="empty-state">거래 상태 확인 중...</div>';
    const rp = await getReadProvider();
    if (!rp) throw new Error('rpc');
    const c = new ethers.Contract(ADMIN_CONFIG.ESCROW_PROXY, ESCROW_VIEW_ABI, rp);
    const TERMINAL = [4, 5, 6];
    const idsToCheck = Object.keys(cache.trades).filter(id => !TERMINAL.includes(cache.trades[id].status));
    for (let i = 0; i < idsToCheck.length; i += 5) {
      await Promise.all(idsToCheck.slice(i, i + 5).map(async id => {
        try {
          const t = await c.getTrade(id);
          const it = cache.trades[id];
          it.status    = Number(t.status);
          it.createdAt = Number(t.createdAt);
          it.seller    = t.seller;
          it.buyer     = t.buyer !== '0x0000000000000000000000000000000000000000' ? t.buyer : null;
        } catch { /* 개별 실패 건너뜀 */ }
      }));
    }
    saveScanCache(cache);

    renderAdminTrades(cache);
  } catch {
    statsEl.innerHTML = '';
    listEl.innerHTML = '<div class="empty-state">조회 실패 — 새로고침을 눌러주세요</div>';
  }
}

// ── 거래 현황 렌더링 (검색 + 미종결 무제한 + 종결 30일) ──────────────────
let _admSearch = '';
function setAdminSearch(v) {
  _admSearch = (v || '').trim().toLowerCase();
  const cache = loadScanCache();
  renderAdminTrades(cache);
}

function renderAdminTrades(cache) {
  const listEl = document.getElementById('tradeList');
  const statsEl = document.getElementById('tradeStats');
  const nowSec = Math.floor(Date.now() / 1000);
  const statusMap = { 2:'판매 중', 3:'진행 중', 4:'완료', 5:'취소', 6:'만료' };
  const colorMap  = { 2:'var(--gold)', 3:'var(--warning)', 4:'var(--success)', 5:'var(--danger)', 6:'var(--text3)' };

  const all = Object.entries(cache.trades)
    .map(([id, it]) => ({ id, ...it }))
    .filter(it => statusMap[it.status]);

  // 통계 (전체 기간 누적)
  const counts = { 2:0, 4:0, 5:0, 6:0 };
  let pendingMpcSum = 0;
  for (const it of all) {
    if (counts[it.status] !== undefined) counts[it.status]++;
    if (it.status === 2) pendingMpcSum += it.mpcAmt;
  }
  statsEl.innerHTML = `
    <div class="stat-row"><div class="stat-label">판매 중 (예치 잠금)</div><div class="stat-val">${counts[2]}건 · ${pendingMpcSum.toLocaleString()} MPC</div></div>
    <div class="stat-row"><div class="stat-label">완료 (누적)</div><div class="stat-val" style="color:var(--success)">${counts[4]}건</div></div>
    <div class="stat-row"><div class="stat-label">취소 / 만료 (누적)</div><div class="stat-val" style="color:var(--text3)">${counts[5]}건 / ${counts[6]}건</div></div>`;

  const row = (it) => {
    const remain = (it.createdAt || 0) + 86400 - nowSec;
    const label = (it.status === 2 && remain <= 0) ? '만료 대기 (반환 필요)' : statusMap[it.status];
    const timeStr = it.createdAt ? new Date(it.createdAt * 1000).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    return `
      <div class="tx-item">
        <div class="tx-header">
          <div style="font-size:13px;font-weight:700;color:${colorMap[it.status]}">${label}${it.status === 2 && remain > 0 ? ' · ' + fmtRemainAdmin(remain) + ' 남음' : ''}</div>
          <div class="tx-id">${timeStr}</div>
        </div>
        <div class="tx-detail">
          <strong>${it.mpcAmt.toLocaleString()} MPC</strong> → <strong>${it.usdt.toFixed(1)} USDT</strong><br>
          판매자 ${shortAddr(it.seller)} · 구매자 ${it.buyer ? shortAddr(it.buyer) : '—'}<br>
          <span style="font-size:11px;color:var(--text3);font-family:monospace">${it.id.slice(0, 20)}...</span>
        </div>
        ${it.status === 2 && remain <= 0 ? `<button class="btn btn-danger btn-sm" onclick="adminExpire('${it.id}', this)">⏰ 만료 처리 (판매자에게 MPC 반환)</button>` : ''}
      </div>`;
  };

  // 검색 모드: 전체 기간에서 지갑 주소·거래 ID로 검색 (사고 조사용)
  if (_admSearch.length >= 4) {
    const hits = all.filter(it =>
      it.id.toLowerCase().includes(_admSearch) ||
      (it.seller || '').toLowerCase().includes(_admSearch) ||
      (it.buyer || '').toLowerCase().includes(_admSearch)
    ).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    listEl.innerHTML = `<div style="font-size:12px;color:var(--gold);margin-bottom:8px">검색 결과 ${hits.length}건 (전체 기간)</div>`
      + (hits.length ? hits.map(row).join('') : '<div class="empty-state">일치하는 거래가 없습니다</div>');
    return;
  }

  // 기본 모드: 미종결은 기간 무제한 전부 + 종결은 최근 30일만
  const open = all.filter(it => it.status === 2).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  const cutoff = nowSec - 30 * 86400;
  const settledRecent = all.filter(it => it.status !== 2 && (it.createdAt || 0) >= cutoff)
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  const settledOld = all.filter(it => it.status !== 2 && (it.createdAt || 0) < cutoff);

  let html = '';
  html += `<div style="font-size:12px;font-weight:700;color:var(--gold);margin:4px 0 6px">● 미종결 거래 ${open.length}건 (기간 무관 전체 표시)</div>`;
  html += open.length ? open.map(row).join('') : '<div class="empty-state" style="padding:14px 0">미종결 거래 없음</div>';
  html += `<div style="font-size:12px;font-weight:700;color:var(--text3);margin:16px 0 6px">● 종결 거래 — 최근 30일 ${settledRecent.length}건</div>`;
  html += settledRecent.length ? settledRecent.map(row).join('') : '<div class="empty-state" style="padding:14px 0">최근 30일 종결 거래 없음</div>';
  if (settledOld.length > 0) {
    const oldMpc = settledOld.reduce((s, it) => s + it.mpcAmt, 0);
    html += `<div style="font-size:12px;color:var(--text3);margin-top:14px;padding:10px;background:var(--card2);border-radius:8px">30일 이전 종결 거래 ${settledOld.length}건 · ${oldMpc.toLocaleString()} MPC — 목록 생략 (위 검색으로 조회 가능)</div>`;
  }
  listEl.innerHTML = html;
}

// ── 만료 처리 (누구나 호출 가능, MPC는 원래 판매자에게 반환됨) ──────────
// Trust Wallet 브라우저는 confirm() 미지원 → 버튼 두 번 누르기 방식으로 확인
async function adminExpire(tradeId, btn) {
  if (!ethersSigner) { showToast('지갑을 먼저 연결해주세요'); return; }

  // 1번째 클릭: 확인 대기 상태로 전환 (5초 내 재클릭 시 실행)
  if (btn && btn.dataset.armed !== '1') {
    btn.dataset.armed = '1';
    btn.textContent = '⚠️ 한 번 더 누르면 실행됩니다 (판매자에게 반환)';
    setTimeout(() => {
      if (btn.dataset.armed === '1') {
        btn.dataset.armed = '';
        btn.textContent = '⏰ 만료 처리 (판매자에게 MPC 반환)';
      }
    }, 5000);
    return;
  }

  try {
    if (btn) { btn.disabled = true; btn.textContent = '처리 중... (Trust Wallet에서 서명해주세요)'; }
    showToast('만료 처리 트랜잭션 전송 중...');
    const esc = new ethers.Contract(ADMIN_CONFIG.ESCROW_PROXY, ESCROW_ADMIN_ABI, ethersSigner);
    const tx = await esc.expireTrade(tradeId);
    await tx.wait();
    showToast('✅ 만료 처리 완료 — 판매자에게 MPC 반환됨');
    loadTrades();
    loadBalances();
  } catch (err) {
    if (btn) { btn.disabled = false; btn.dataset.armed = ''; btn.textContent = '⏰ 만료 처리 (판매자에게 MPC 반환)'; }
    showToast('실패: ' + String(err?.reason || err?.message || err).slice(0, 80));
  }
}

// ── 멀티시그 트랜잭션 목록 ──────────────────────────────────────────────
async function loadTxList() {
  const listEl = document.getElementById('txList');
  listEl.innerHTML = '<div class="empty-state">조회 중...</div>';

  try {
    const rp = await getReadProvider();
    if (!rp) { listEl.innerHTML = '<div class="empty-state">RPC 연결 실패</div>'; return; }

    const msRead = new ethers.Contract(ADMIN_CONFIG.MULTISIG, MULTISIG_ABI, rp);
    const countBN = await msRead.transactionCount();
    const count = countBN.toNumber();

    if (count === 0) {
      listEl.innerHTML = '<div class="empty-state">대기 중인 요청이 없습니다</div>';
      return;
    }

    // 최근 30건만 조회 (누적 시 성능 보호)
    const escrowIface = new ethers.utils.Interface(ESCROW_ADMIN_ABI);
    let html = '';
    let pendingCount = 0;
    const startIdx = Math.max(0, count - 30);

    for (let i = count - 1; i >= startIdx; i--) {
      const [to, , data, executed, confirmations] = await msRead.getTransaction(i);
      if (executed) continue; // 이미 실행된 것은 건너뜀
      pendingCount++;

      // 내가 서명했는지 확인
      const myConfirmed = walletAddress
        ? await msRead.confirmed(i, walletAddress)
        : false;

      // calldata 디코딩
      let desc = '알 수 없는 트랜잭션';
      try {
        const decoded = escrowIface.decodeFunctionData('emergencyWithdraw', data);
        const tokenName = decoded.token.toLowerCase() === ADMIN_CONFIG.MPC_TOKEN.toLowerCase()  ? 'MPC'
                        : decoded.token.toLowerCase() === ADMIN_CONFIG.USDT_TOKEN.toLowerCase() ? 'USDT'
                        : shortAddr(decoded.token);
        const decimals = tokenName === 'USDT' ? 6 : 18;
        const amt = parseFloat(ethers.utils.formatUnits(decoded.amount, decimals)).toLocaleString();
        desc = `긴급 출금 — <strong>${amt} ${tokenName}</strong> → <strong>${shortAddr(decoded.to)}</strong>`;
      } catch {}

      const sigsText = confirmations.toString() + ' / 2 서명';
      const sigsClass = confirmations.gte(2) ? 'done' : 'pending';

      const confirmBtn = myConfirmed
        ? `<button class="btn btn-outline btn-sm" onclick="revokeSign(${i})">서명 취소</button>`
        : `<button class="btn btn-success btn-sm" onclick="signTx(${i})">✍️ 서명하기</button>`;

      html += `
        <div class="tx-item" id="tx-${i}">
          <div class="tx-header">
            <div class="tx-id">#${i} · ${to.slice(0,10)}...</div>
            <div class="tx-sigs ${sigsClass}">${sigsText}</div>
          </div>
          <div class="tx-detail">${desc}${myConfirmed ? '<br><span style="color:var(--success);font-size:12px;">✅ 내 서명 완료</span>' : ''}</div>
          <div class="tx-actions">${confirmBtn}</div>
        </div>`;
    }

    listEl.innerHTML = pendingCount === 0
      ? '<div class="empty-state">대기 중인 요청이 없습니다</div>'
      : html;

  } catch (err) {
    listEl.innerHTML = '<div class="empty-state">조회 실패: ' + (err?.message || String(err)) + '</div>';
  }
}

// ── 긴급 출금 제안 ───────────────────────────────────────────────────────
async function proposeWithdrawal() {
  const errEl = document.getElementById('withdrawError');
  errEl.style.display = 'none';

  const tokenKey  = document.getElementById('withdrawToken').value;
  const amountStr = document.getElementById('withdrawAmount').value.trim();
  const toAddr    = document.getElementById('withdrawTo').value.trim();

  // 입력값 검증
  if (!amountStr || parseFloat(amountStr) <= 0) {
    errEl.textContent = '출금 금액을 입력해주세요.';
    errEl.style.display = 'block';
    return;
  }
  if (!toAddr || !ethers.utils.isAddress(toAddr)) {
    errEl.textContent = '올바른 수령 지갑 주소를 입력해주세요.';
    errEl.style.display = 'block';
    return;
  }
  if (!walletAddress || !isOwner) {
    errEl.textContent = '오너 지갑으로 연결되지 않았습니다.';
    errEl.style.display = 'block';
    return;
  }

  const tokenAddr = tokenKey === 'MPC' ? ADMIN_CONFIG.MPC_TOKEN : ADMIN_CONFIG.USDT_TOKEN;
  const decimals  = tokenKey === 'MPC' ? 18 : 6;
  let amountWei;
  try {
    amountWei = ethers.utils.parseUnits(amountStr, decimals);
  } catch {
    errEl.textContent = '금액 형식이 올바르지 않습니다.';
    errEl.style.display = 'block';
    return;
  }

  // 잔액 확인
  try {
    const rp = await getReadProvider();
    if (rp) {
      const tokenContract = new ethers.Contract(tokenAddr, ERC20_ABI, rp);
      const bal = await tokenContract.balanceOf(ADMIN_CONFIG.ESCROW_PROXY);
      if (bal.lt(amountWei)) {
        const balFmt = parseFloat(ethers.utils.formatUnits(bal, decimals)).toLocaleString();
        errEl.textContent = `컨트랙트 ${tokenKey} 잔액 부족 (보유: ${balFmt} ${tokenKey})`;
        errEl.style.display = 'block';
        return;
      }
    }
  } catch {}

  // calldata 인코딩
  const escrowIface = new ethers.utils.Interface(ESCROW_ADMIN_ABI);
  const callData = escrowIface.encodeFunctionData('emergencyWithdraw', [tokenAddr, amountWei, toAddr]);

  setBtn('btnWithdraw', '제안 중...', true);
  try {
    // 1단계: 제안 제출
    const tx = await multisigContract.submitTransaction(ADMIN_CONFIG.ESCROW_PROXY, 0, callData);
    const receipt = await tx.wait();

    // 제출된 txId 추출 (TransactionSubmitted 이벤트에서)
    const iface = new ethers.utils.Interface(['event TransactionSubmitted(uint256 indexed txId, address indexed submitter, address indexed to, bytes data)']);
    let newTxId = null;
    for (const log of receipt.logs) {
      try {
        const parsed = iface.parseLog(log);
        if (parsed.name === 'TransactionSubmitted') {
          newTxId = parsed.args.txId.toNumber();
          break;
        }
      } catch {}
    }

    showToast('✅ 출금 제안 완료! 이제 서명을 진행합니다...');

    // 2단계: 제안자 본인도 바로 서명
    if (newTxId !== null) {
      const tx2 = await multisigContract.confirmTransaction(newTxId);
      await tx2.wait();
      showToast('✅ 내 서명 완료 (1/2). 다른 지갑에서 서명해주세요.');
    }

    document.getElementById('withdrawAmount').value = '';
    document.getElementById('withdrawTo').value = '';
    await loadTxList();
  } catch (err) {
    errEl.textContent = parseAdminError(err);
    errEl.style.display = 'block';
  } finally {
    setBtn('btnWithdraw', '🚨 출금 제안하기', false);
  }
}

// ── 트랜잭션 서명 ────────────────────────────────────────────────────────
async function signTx(txId) {
  if (!walletAddress || !isOwner) { showToast('오너 지갑으로 연결해주세요'); return; }
  try {
    showToast('서명 요청 중...');
    const tx = await multisigContract.confirmTransaction(txId);
    await tx.wait();
    showToast('✅ 서명 완료!');
    await Promise.all([loadTxList(), loadBalances()]);
  } catch (err) {
    showToast('❌ ' + parseAdminError(err));
  }
}

// ── 서명 취소 ────────────────────────────────────────────────────────────
async function revokeSign(txId) {
  if (!walletAddress || !isOwner) { showToast('오너 지갑으로 연결해주세요'); return; }
  try {
    showToast('서명 취소 중...');
    const tx = await multisigContract.revokeConfirmation(txId);
    await tx.wait();
    showToast('✅ 서명 취소 완료');
    await loadTxList();
  } catch (err) {
    showToast('❌ ' + parseAdminError(err));
  }
}

// ── 에러 파싱 ────────────────────────────────────────────────────────────
function parseAdminError(err) {
  const msg = err?.message || String(err);
  if (err?.code === 4001 || err?.code === 'ACTION_REJECTED' ||
      msg.toLowerCase().includes('user rejected') || msg.toLowerCase().includes('action_rejected')) {
    return '서명을 취소했습니다.';
  }
  if (msg.includes('insufficient funds')) return 'POL(가스비)이 부족합니다.';
  if (msg.includes('already confirmed'))  return '이미 서명한 트랜잭션입니다.';
  if (msg.includes('not confirmed'))      return '아직 서명하지 않은 트랜잭션입니다.';
  if (msg.includes('already executed'))   return '이미 실행된 트랜잭션입니다.';
  if (msg.includes('execution failed'))   return '실행 실패 - 컨트랙트 잔액을 확인해주세요.';
  if (msg.includes('owner only'))         return '오너 지갑으로만 가능합니다.';
  return msg.length > 80 ? msg.slice(0, 80) + '...' : msg;
}

// ── 초기화 ───────────────────────────────────────────────────────────────
window.addEventListener('unhandledrejection', (e) => {
  const msg = e.reason?.message || String(e.reason);
  if (msg.toLowerCase().includes('user rejected') || e.reason?.code === 4001) return;
  console.error('[admin unhandled]', e.reason);
});
